name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.claude/**'
      - 'scripts/**'
      - '.github/dependabot.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Stage served files into _site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='_site/' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.claude/' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='scripts/' \
            --exclude='node_modules/' \
            --exclude='tmp/' \
            --exclude='*.md' \
            ./ _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
